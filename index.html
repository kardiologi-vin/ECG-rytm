<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rytm analys</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; padding: 10px; margin: 0; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; font-size: 1.5rem; margin-bottom: 20px; }
        
        .btn-capture { 
            background: #007bff; 
            color: white; 
            border: none; 
            padding: 20px 40px; 
            font-size: 40px; 
            border-radius: 50px; 
            cursor: pointer; 
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 4px 6px rgba(0,123,255,0.3);
        }
        .btn-capture:active { transform: scale(0.95); background: #0056b3; }
        
        #status { color: #888; font-size: 0.9rem; margin-top: 15px; min-height: 1.2em; }
        
        .canvas-container { display: flex; flex-direction: column; align-items: center; gap: 20px; margin-top: 25px; }
        canvas { max-width: 100%; height: auto; border: 1px solid #ddd; border-radius: 8px; background: #fafafa; }
        h3 { margin: 5px 0; font-size: 1rem; color: #555; }
    </style>
</head>
<body>

<div class="container">
    <h1>Rytm analys</h1>

    <input type="file" id="ecgUpload" accept="image/*" capture="environment" style="display: none;">

    <button onclick="document.getElementById('ecgUpload').click()" class="btn-capture">
        📷
    </button>

    <div id="status">Laddar systemet...</div>

    <div class="canvas-container">
        <div>
            <h3>Original</h3>
            <canvas id="canvasInput"></canvas>
        </div>
        <div>
            <h3>Digital Signal (Filtrerad)</h3>
            <canvas id="canvasOutput"></canvas>
        </div>
    </div>
</div>

<script async src="https://docs.opencv.org/4.x/opencv.js" onload="onOpenCvReady();"></script>
<script src="processor.js"></script>

<script>
    function onOpenCvReady() {
        document.getElementById('status').innerText = 'OpenCV.js är redo.';
        if (typeof initProcessor === "function") initProcessor();
    }
</script>

</body>
</html>
